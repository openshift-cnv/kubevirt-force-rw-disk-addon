apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base
  - cert-manager.yaml

patches:
  - target:
      kind: MutatingWebhookConfiguration
      name: force-rw-disk-webhook
    patch: |
      - op: add
        path: /metadata/annotations
        value:
          cert-manager.io/inject-ca-from: kubevirt-force-rw-disk-addon/force-rw-disk-webhook-tls
