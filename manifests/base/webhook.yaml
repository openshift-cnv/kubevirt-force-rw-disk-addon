---
apiVersion: v1
kind: Namespace
metadata:
  name: kubevirt-force-rw-disk-addon
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: force-rw-disk-webhook
  namespace: kubevirt-force-rw-disk-addon
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: force-rw-disk-webhook
  namespace: kubevirt-force-rw-disk-addon
  labels:
    app: force-rw-disk-webhook
spec:
  replicas: 1
  selector:
    matchLabels:
      app: force-rw-disk-webhook
  template:
    metadata:
      labels:
        app: force-rw-disk-webhook
    spec:
      serviceAccountName: force-rw-disk-webhook
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: webhook
          image: force-rw-disk-webhook:latest
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          ports:
            - containerPort: 8443
              name: webhook
              protocol: TCP
          env:
            - name: SIDECAR_IMAGE
              value: force-rw-disk-sidecar:latest
          volumeMounts:
            - name: tls-certs
              mountPath: /tmp/k8s-webhook-server/serving-certs
              readOnly: true
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
      volumes:
        - name: tls-certs
          secret:
            secretName: force-rw-disk-webhook-tls
---
apiVersion: v1
kind: Service
metadata:
  name: force-rw-disk-webhook
  namespace: kubevirt-force-rw-disk-addon
spec:
  selector:
    app: force-rw-disk-webhook
  ports:
    - port: 443
      targetPort: 8443
      protocol: TCP
---
apiVersion: admissionregistration.k8s.io/v1
kind: MutatingWebhookConfiguration
metadata:
  name: force-rw-disk-webhook
webhooks:
  - name: force-rw-disk-pod.kubevirt.io
    admissionReviewVersions: ["v1"]
    sideEffects: None
    clientConfig:
      service:
        name: force-rw-disk-webhook
        namespace: kubevirt-force-rw-disk-addon
        path: /mutate-pod
    rules:
      - apiGroups: [""]
        apiVersions: ["v1"]
        operations: ["CREATE"]
        resources: ["pods"]
    objectSelector:
      matchExpressions:
        - key: kubevirt.io
          operator: Exists
    failurePolicy: Ignore
    reinvocationPolicy: IfNeeded
